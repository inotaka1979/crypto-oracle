<script>
// ═══ CONFIG ═══
var COINS=[
  {id:'bitcoin',sym:'BTC',name:'Bitcoin',profile:'A'},
  {id:'ethereum',sym:'ETH',name:'Ethereum',profile:'A'},
  {id:'ripple',sym:'XRP',name:'XRP',profile:'B'},
  {id:'stellar',sym:'XLM',name:'Stellar',profile:'C'},
  {id:'dogecoin',sym:'DOGE',name:'Dogecoin',profile:'D'},
  {id:'shiba-inu',sym:'SHIB',name:'Shiba Inu',profile:'E'}
];
var API='https://api.coingecko.com/api/v3';
var currency='jpy',currentCoin=COINS[0],chartType='line',chartDays=90;
var coinData={},jpyRate=null,prevJpyRate=null,chart=null,refreshTimer=null;

// ═══ v2 PREDICTION MODELS ═══
function adaptive(p){
  if(p.length<6)return p[p.length-1];
  var c=0,r=0;
  for(var i=p.length-5;i<p.length;i++){
    var pt=p[i-1]-p[i-2],ac=p[i]-p[i-1];
    if((pt>0)===(ac>0))c++;else r++;
  }
  var t=p[p.length-1]-p[p.length-2];
  return c>r?p[p.length-1]+t*0.2:p[p.length-1]-t*0.15;
}
function meanRev5(p){
  if(p.length<5)return p[p.length-1];
  var sma=p.slice(-5).reduce(function(a,b){return a+b},0)/5;
  return p[p.length-1]+(sma-p[p.length-1])*0.3;
}
function streak(p){
  if(p.length<4)return p[p.length-1];
  var d1=p[p.length-1]-p[p.length-2],d2=p[p.length-2]-p[p.length-3],d3=p[p.length-3]-p[p.length-4];
  var same=(d1>0)===(d2>0),triple=same&&(d2>0)===(d3>0);
  if(triple)return p[p.length-1]+d1*0.4;
  if(same)return p[p.length-1]+d1*0.25;
  return p[p.length-1]-d1*0.15;
}
function bollinger(p){
  if(p.length<20)return p[p.length-1];
  var sma=p.slice(-20).reduce(function(a,b){return a+b},0)/20;
  var v=p.slice(-20).reduce(function(a,b){return a+(b-sma)*(b-sma)},0)/20,std=Math.sqrt(v);
  var u=sma+2*std,lo=sma-2*std,pos=(p[p.length-1]-lo)/(u-lo||1);
  if(pos>0.8)return p[p.length-1]-std*0.15;
  if(pos<0.2)return p[p.length-1]+std*0.15;
  return p[p.length-1]+(sma-p[p.length-1])*0.1;
}
function rsi2(p){
  if(p.length<4)return p[p.length-1];
  var g=0,l=0;
  for(var i=p.length-2;i<p.length;i++){var d=p[i]-p[i-1];if(d>0)g+=d;else l-=d;}
  var rsi=l===0?100:100-100/(1+g/l);
  if(rsi>80)return p[p.length-1]-Math.abs(p[p.length-1]-p[p.length-2])*0.2;
  if(rsi<20)return p[p.length-1]+Math.abs(p[p.length-1]-p[p.length-2])*0.2;
  return p[p.length-1];
}

var PREDICT={
  A:function(p){return(adaptive(p)+meanRev5(p))/2},
  B:function(p){return(adaptive(p)+rsi2(p))/2},
  C:function(p){return(streak(p)+bollinger(p))/2},
  D:function(p){return(streak(p)+adaptive(p))/2},
  E:function(p){return rsi2(p)}
};
var MODEL_NAMES={A:'Adaptive+MeanRev5',B:'Adaptive+RSI2',C:'Streak+Bollinger',D:'Streak+Adaptive',E:'RSI2'};
var DIR_ACC={A:{BTC:75,ETH:80},B:{XRP:65},C:{XLM:70},D:{DOGE:70},E:{SHIB:75}};

// ═══ VOLATILITY & ALERTS ═══
function volRegime(p){
  if(p.length<15)return{regime:'unknown',val:0};
  var returns=[];
  for(var i=p.length-14;i<p.length;i++)returns.push(Math.abs(p[i]-p[i-1])/p[i-1]);
  var vol=returns.reduce(function(a,b){return a+b},0)/returns.length;
  if(vol>0.05)return{regime:'high',val:vol};
  if(vol<0.015)return{regime:'low',val:vol};
  return{regime:'mid',val:vol};
}
function detectAnomaly(p){
  if(p.length<10)return null;
  var avgMove=0;
  for(var i=p.length-10;i<p.length-1;i++)avgMove+=Math.abs(p[i]-p[i-1])/p[i-1];
  avgMove/=9;
  var lastMove=Math.abs(p[p.length-1]-p[p.length-2])/p[p.length-2];
  if(lastMove>avgMove*3)return'\u26A1 急変動検知（通常の'+Math.round(lastMove/avgMove)+'倍）';
  return null;
}

// ═══ BACKTEST ═══
function backtest(p,profile){
  var fn=PREDICT[profile];
  var n=p.length,testN=Math.min(20,Math.floor(n*0.4)),start=n-testN;
  var dirs=0,nE=[],mE=[];
  for(var i=start;i<n;i++){
    var tp=p.slice(0,i),actual=p[i],prev=p[i-1];
    var pred=fn(tp);
    nE.push(Math.abs(prev-actual)/actual*100);
    mE.push(Math.abs(pred-actual)/actual*100);
    if((pred>prev)===(actual>prev))dirs++;
  }
  var avg=function(a){return a.reduce(function(x,y){return x+y},0)/a.length};
  return{dir:dirs/testN*100,mape:avg(mE),naive:avg(nE),n:testN};
}

// ═══ ENTRY/EXIT ═══
function suggestEntry(last,pred,p){
  if(p.length<14)return null;
  var atr=0;
  for(var i=p.length-14;i<p.length;i++)atr+=Math.abs(p[i]-p[i-1]);
  atr/=14;
  var up=pred>last;
  var entry=up?last-atr*0.3:last+atr*0.3;
  var target=pred;
  var stop=up?last-atr*1.5:last+atr*1.5;
  var risk=Math.abs(entry-stop),reward=Math.abs(target-entry);
  var rr=risk>0?reward/risk:0;
  return{entry:entry,target:target,stop:stop,rr:rr,up:up};
}

// ═══ PREDICTION HISTORY (localStorage) ═══
function savePrediction(coinId,currentPrice,predictedPrice,direction){
  try{
    var key='crypto_predictions';
    var history=JSON.parse(localStorage.getItem(key)||'[]');
    history.push({
      coin:coinId,
      time:new Date().toISOString(),
      current:currentPrice,
      predicted:predictedPrice,
      direction:direction,
      actual:null
    });
    // 6銘柄 x 90日分を上限
    if(history.length>540)history.splice(0,history.length-540);
    localStorage.setItem(key,JSON.stringify(history));
  }catch(e){console.warn('savePrediction error:',e);}
}

function verifyPredictions(currentPrices){
  try{
    var history=JSON.parse(localStorage.getItem('crypto_predictions')||'[]');
    var now=Date.now();
    history.forEach(function(p){
      if(!p.actual&&now-new Date(p.time).getTime()>20*3600000){
        var price=currentPrices[p.coin];
        if(price){
          p.actual=price;
          p.directionCorrect=(p.direction==='up')===(price>p.current);
        }
      }
    });
    localStorage.setItem('crypto_predictions',JSON.stringify(history));
    var verified=history.filter(function(p){return p.actual!==null});
    var correct=verified.filter(function(p){return p.directionCorrect}).length;
    return{
      total:verified.length,
      correct:correct,
      accuracy:verified.length>0?(correct/verified.length*100).toFixed(1):'---'
    };
  }catch(e){return{total:0,correct:0,accuracy:'---'};}
}

// ═══ CACHE & FETCH ═══
function cacheKey(url){
  // 短いキーを生成
  var hash=0;
  for(var i=0;i<url.length;i++){hash=((hash<<5)-hash)+url.charCodeAt(i);hash|=0;}
  return'cache_'+Math.abs(hash);
}

function fetchWithFallback(url){
  return fetch(url,{signal:AbortSignal.timeout(15000)})
    .then(function(res){
      if(!res.ok)throw new Error('HTTP '+res.status);
      return res.json();
    })
    .then(function(data){
      try{localStorage.setItem(cacheKey(url),JSON.stringify({data:data,time:Date.now()}));}catch(e){}
      return data;
    })
    .catch(function(e){
      console.warn('API error:',url,e.message);
      try{
        var cached=localStorage.getItem(cacheKey(url));
        if(cached){
          var obj=JSON.parse(cached);
          // キャッシュ10分以内なら使用
          if(Date.now()-obj.time<600000)return obj.data;
        }
      }catch(ex){}
      return null;
    });
}

// ═══ DATA FETCH ═══
function parseDailyOHLCV(d){
  var daily={};
  d.prices.forEach(function(item){
    var ts=item[0],price=item[1];
    var day=new Date(ts).toISOString().slice(0,10);
    if(!daily[day])daily[day]={o:price,h:price,l:price,c:price,v:0};
    else{daily[day].c=price;daily[day].h=Math.max(daily[day].h,price);daily[day].l=Math.min(daily[day].l,price);}
  });
  if(d.total_volumes)d.total_volumes.forEach(function(item){
    var ts=item[0],vol=item[1];
    var day=new Date(ts).toISOString().slice(0,10);
    if(daily[day])daily[day].v+=vol;
  });
  var days=Object.keys(daily).sort();
  return{
    dates:days,
    prices:days.map(function(d){return daily[d].c}),
    highs:days.map(function(d){return daily[d].h}),
    lows:days.map(function(d){return daily[d].l}),
    opens:days.map(function(d){return daily[d].o}),
    volumes:days.map(function(d){return daily[d].v})
  };
}


function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

async function loadAllData(){
  setStatus('USD/JPY取得中...');

  // USD/JPYレート取得（全銘柄のUSD/JPYを一括で取る）
  var rateData=await fetchWithFallback(API+'/simple/price?ids=bitcoin&vs_currencies=usd,jpy');
  if(rateData&&rateData.bitcoin&&rateData.bitcoin.jpy&&rateData.bitcoin.usd){
    prevJpyRate=jpyRate;
    jpyRate=rateData.bitcoin.jpy/rateData.bitcoin.usd;
  }
  if(!jpyRate)jpyRate=158.6;

  // 各銘柄データ取得（2秒間隔）
  for(var i=0;i<COINS.length;i++){
    var c=COINS[i];
    setStatus(c.sym+' 取得中... ('+(i+1)+'/'+COINS.length+')');
    var data=await fetchWithFallback(API+'/coins/'+c.id+'/market_chart?vs_currency=usd&days=90');
    if(data&&data.prices){
      coinData[c.id]=parseDailyOHLCV(data);
    }
    if(i<COINS.length-1)await sleep(2000);
  }

  // 予測を保存 & 検証
  var currentPrices={};
  COINS.forEach(function(c){
    var d=coinData[c.id];
    if(d&&d.prices.length>0){
      var lastPrice=d.prices[d.prices.length-1];
      currentPrices[c.id]=lastPrice;
      var pred=PREDICT[c.profile](d.prices);
      var dir=pred>lastPrice?'up':'down';
      savePrediction(c.id,lastPrice,pred,dir);
    }
  });

  // 予測検証を表示
  var vResult=verifyPredictions(currentPrices);
  var histEl=document.getElementById('predHistory');
  if(vResult.total>0){
    histEl.style.display='block';
    document.getElementById('predAccText').textContent=
      vResult.correct+'/'+vResult.total+' 的中 ('+vResult.accuracy+'%)';
  }

  setStatus('更新完了');
  renderCoin(currentCoin);
  startTimer();
}

// ═══ PRICE FORMATTING ═══
function formatPrice(price,coinSym,cur){
  var sym=cur==='jpy'?'\u00a5':'$';
  var rate=cur==='jpy'?(jpyRate||158.6):1;
  var dp=price*rate;
  if(coinSym==='SHIB')return sym+dp.toFixed(cur==='jpy'?4:10);
  if(dp>=100)return sym+Math.round(dp).toLocaleString();
  return sym+dp.toPrecision(4);
}

// ═══ RENDER ═══
function renderCoin(coin){
  currentCoin=coin;
  var data=coinData[coin.id];
  if(!data){document.getElementById('priceMain').textContent='データなし';return;}

  var p=data.prices,last=p[p.length-1],prev=p[p.length-2]||last;
  var chg=((last-prev)/prev*100);

  // 現在価格
  document.getElementById('priceMain').textContent=formatPrice(last,coin.sym,currency);
  var chgEl=document.getElementById('priceChange');
  chgEl.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';
  chgEl.className='price-change '+(chg>=0?'up':'down');

  // 予測
  var pred=PREDICT[coin.profile](p);
  var predDir=pred>last?'up':pred<last?'down':'flat';
  var predChg=((pred-last)/last*100);
  document.getElementById('predPrice').textContent=formatPrice(pred,coin.sym,currency);
  var dirEl=document.getElementById('predDir');
  dirEl.textContent=(predChg>=0?'\u2191+':'\u2193')+predChg.toFixed(2)+'%';
  dirEl.className='pred-dir '+predDir;
  document.getElementById('predIcon').textContent=predDir==='up'?'\uD83D\uDCC8':predDir==='down'?'\uD83D\uDCC9':'\uD83D\uDCCA';

  // USD/JPY & 要因分解
  var rate=jpyRate||158.6;
  document.getElementById('jpyRate').textContent='\u00a5'+rate.toFixed(1);
  var cryptoChg=((last-prev)/prev*100);
  var cryptoEl=document.getElementById('decompCrypto');
  cryptoEl.textContent=(cryptoChg>=0?'+':'')+cryptoChg.toFixed(2)+'%';
  cryptoEl.className=cryptoChg>=0?'up':'down';
  var fxEl=document.getElementById('decompFx');
  if(prevJpyRate&&prevJpyRate!==rate){
    var fxChg=((rate-prevJpyRate)/prevJpyRate*100);
    fxEl.textContent=(fxChg>=0?'+':'')+fxChg.toFixed(2)+'%';
    fxEl.className=fxChg>=0?'up':'down';
  }else{
    fxEl.textContent='---';
    fxEl.className='';
  }

  // ボラティリティ & アラート
  var vol=volRegime(p);
  var anomaly=detectAnomaly(p);
  var alertBox=document.getElementById('alertBox');
  if(anomaly){alertBox.className='alert-box danger';alertBox.textContent=anomaly;}
  else if(vol.regime==='low'){alertBox.className='alert-box warning';alertBox.textContent='\u26A0\uFE0F レンジ相場：予測精度低下中。様子見推奨。';}
  else{alertBox.className='alert-box';alertBox.style.display='none';}

  // バックテスト
  var bt=backtest(p,coin.profile);

  // 情報グリッド
  var dirAcc=(DIR_ACC[coin.profile]||{})[coin.sym]||bt.dir;
  document.getElementById('infoDirAcc').textContent=Math.round(dirAcc)+'%';
  var stars=Math.round(Math.min(5,dirAcc/20));
  var starStr='';
  for(var si=0;si<5;si++)starStr+=si<stars?'\u2605':'\u2606';
  document.getElementById('infoReliability').textContent=starStr;
  document.getElementById('infoVol').textContent=vol.regime==='high'?'\u9AD8\u26A1':vol.regime==='low'?'\u4F4E\uD83D\uDCCA':'\u4E2D';
  document.getElementById('infoMape').textContent=bt.mape.toFixed(2)+'%';

  // エントリー提案
  var ee=suggestEntry(last,pred,p);
  if(ee){
    document.getElementById('entryBuy').textContent=formatPrice(ee.entry,coin.sym,currency);
    document.getElementById('entryTarget').textContent=formatPrice(ee.target,coin.sym,currency);
    document.getElementById('entryStop').textContent=formatPrice(ee.stop,coin.sym,currency);
    document.getElementById('entryRR').textContent=ee.rr.toFixed(1)+':1'+(ee.rr>=1.5?' \u2705':'');
  }

  // スコア & 判定
  var score=Math.min(100,bt.dir*0.5+Math.max(0,100-bt.mape*10)*0.3+(predChg>0?60:40)*0.2);
  if(vol.regime==='low')score=Math.min(score,50);
  document.getElementById('scoreNum').textContent=Math.round(score);
  var recEl=document.getElementById('recBadge');
  if(score>=65){recEl.textContent='\uD83D\uDCC8 買い検討';recEl.className='rec-badge rec-buy';}
  else if(score<=35){recEl.textContent='\uD83D\uDCC9 売り検討';recEl.className='rec-badge rec-sell';}
  else{recEl.textContent='\uD83D\uDCCA 様子見';recEl.className='rec-badge rec-hold';}

  // チャート
  renderChart(data,coin);

  // 銘柄バー強調
  document.querySelectorAll('.coin-btn').forEach(function(b){
    b.className='coin-btn'+(b.dataset.id===coin.id?' active':'');
  });
}

// ═══ CHART ═══
var tvChart=null;

function destroyTvChart(){
  if(tvChart){tvChart.remove();tvChart=null;}
}

function renderChart(data,coin){
  var canvasEl=document.getElementById('mainChart');
  var tvEl=document.getElementById('tvChart');
  var rate=currency==='jpy'?(jpyRate||158.6):1;

  if(chartType==='candle'){
    // --- lightweight-charts (TradingView) ローソク足 ---
    if(chart){chart.destroy();chart=null;}
    canvasEl.style.display='none';
    tvEl.style.display='block';
    destroyTvChart();

    // Build candle + volume data from parseDailyOHLCV result
    var n=Math.min(chartDays,data.dates.length);
    var candleData=[];
    var volData=[];
    data.dates.slice(-n).forEach(function(d,i){
      var idx=data.dates.length-n+i;
      var ts=Math.floor(new Date(d+'T00:00:00Z').getTime()/1000);
      var o=data.opens[idx]*rate, h=data.highs[idx]*rate, l=data.lows[idx]*rate, c=data.prices[idx]*rate;
      candleData.push({time:ts,open:o,high:h,low:l,close:c});
      var vol=data.volumes[idx]||0;
      volData.push({time:ts,value:vol,color:c>=o?'rgba(16,185,129,0.3)':'rgba(239,68,68,0.3)'});
    });

    tvChart=LightweightCharts.createChart(tvEl,{
      width:tvEl.clientWidth,
      height:tvEl.clientHeight,
      layout:{background:{type:'solid',color:'#111827'},textColor:'#64748b',fontSize:9},
      grid:{vertLines:{color:'rgba(30,41,59,0.5)'},horzLines:{color:'rgba(30,41,59,0.5)'}},
      crosshair:{mode:0},
      rightPriceScale:{borderColor:'#1e293b'},
      timeScale:{borderColor:'#1e293b',timeVisible:false,fixLeftEdge:true,fixRightEdge:true},
      localization:{
        priceFormatter:function(p){
          if(p>=1000000)return(p/1000000).toFixed(2)+'M';
          if(p>=1000)return Math.round(p).toLocaleString();
          return p.toPrecision(4);
        }
      }
    });

    var candleSeries=tvChart.addCandlestickSeries({
      upColor:'#10b981',downColor:'#ef4444',
      borderUpColor:'#10b981',borderDownColor:'#ef4444',
      wickUpColor:'#10b981',wickDownColor:'#ef4444'
    });
    candleSeries.setData(candleData);

    // Volume as histogram overlay
    var volumeSeries=tvChart.addHistogramSeries({
      priceFormat:{type:'volume'},
      priceScaleId:'vol'
    });
    tvChart.priceScale('vol').applyOptions({scaleMargins:{top:0.8,bottom:0}});
    if(volData.length)volumeSeries.setData(volData);

    tvChart.timeScale().fitContent();

    // Resize handling
    var ro=new ResizeObserver(function(){
      if(tvChart)tvChart.applyOptions({width:tvEl.clientWidth,height:tvEl.clientHeight});
    });
    ro.observe(tvEl);

  }else{
    // --- Chart.js ラインチャート ---
    destroyTvChart();
    tvEl.style.display='none';
    canvasEl.style.display='block';
    if(chart){chart.destroy();chart=null;}

    var n2=Math.min(chartDays,data.dates.length);
    var dates=data.dates.slice(-n2);
    var displayPrices=data.prices.slice(-n2).map(function(p){return p*rate});
    chart=new Chart(canvasEl,{
      type:'line',
      data:{
        labels:dates.map(function(d){return d.slice(5)}),
        datasets:[{
          data:displayPrices,
          borderColor:'#22d3ee',
          backgroundColor:'rgba(34,211,238,0.08)',
          borderWidth:1.5,
          pointRadius:0,
          fill:true,
          tension:0.3
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        animation:{duration:0},
        plugins:{legend:{display:false}},
        scales:{
          x:{ticks:{maxTicksLimit:6,font:{size:9},color:'#64748b'},grid:{display:false}},
          y:{ticks:{font:{size:9},color:'#64748b',callback:function(v){return v>1000?Math.round(v/1000)+'k':v.toPrecision(3)}},grid:{color:'rgba(30,41,59,0.5)'}}
        }
      }
    });
  }
}

// ═══ UI HELPERS ═══
function buildCoinBar(){
  var bar=document.getElementById('coinBar');
  COINS.forEach(function(c){
    var b=document.createElement('button');
    b.className='coin-btn'+(c===currentCoin?' active':'');
    b.textContent=c.sym;
    b.dataset.id=c.id;
    b.onclick=function(){renderCoin(c)};
    bar.appendChild(b);
  });
}

function setCurrency(c){
  currency=c;
  document.getElementById('btnJpy').className='btn-cur'+(c==='jpy'?' active':'');
  document.getElementById('btnUsd').className='btn-cur'+(c==='usd'?' active':'');
  renderCoin(currentCoin);
}

function setChartType(t,el){
  chartType=t;
  document.querySelectorAll('.chart-btn[data-group="type"]').forEach(function(b){
    b.className='chart-btn'+(b===el?' active':'');
  });
  renderCoin(currentCoin);
}

function setDays(d,el){
  chartDays=d;
  document.querySelectorAll('.chart-btn[data-group="period"]').forEach(function(b){
    b.className='chart-btn'+(b===el?' active':'');
  });
  renderCoin(currentCoin);
}

function setTab(idx,el){
  document.querySelectorAll('.tab').forEach(function(t){t.className='tab'});
  el.className='tab active';
  var tc=document.getElementById('tabContent');
  var data=coinData[currentCoin.id];
  if(!data)return;
  var p=data.prices,bt=backtest(p,currentCoin.profile);

  if(idx===0){
    var pred=PREDICT[currentCoin.profile](p);
    var predChg=((pred-p[p.length-1])/p[p.length-1]*100);
    var score=Math.min(100,bt.dir*0.5+Math.max(0,100-bt.mape*10)*0.3+(predChg>0?60:40)*0.2);
    var vol=volRegime(p);if(vol.regime==='low')score=Math.min(score,50);
    var rec,cls;
    if(score>=65){rec='\uD83D\uDCC8 買い検討';cls='rec-buy';}
    else if(score<=35){rec='\uD83D\uDCC9 売り検討';cls='rec-sell';}
    else{rec='\uD83D\uDCCA 様子見';cls='rec-hold';}
    tc.innerHTML='<div class="score-gauge"><div class="score-num">'+Math.round(score)+'</div><div class="score-label">総合スコア</div><div class="rec-badge '+cls+'">'+rec+'</div></div>';
  }else if(idx===1){
    var mn=MODEL_NAMES[currentCoin.profile];
    tc.innerHTML='<table class="model-table"><tr><th>モデル</th><th>方向精度</th><th>MAPE</th><th>テスト数</th></tr>'+
      '<tr><td>'+mn+'</td><td>'+bt.dir.toFixed(0)+'%</td><td>'+bt.mape.toFixed(2)+'%</td><td>'+bt.n+'</td></tr>'+
      '<tr><td>ナイーブ</td><td>50%</td><td>'+bt.naive.toFixed(2)+'%</td><td>'+bt.n+'</td></tr></table>'+
      '<div style="margin-top:12px;font-size:10px;color:var(--dim)">プロファイル: '+currentCoin.profile+' \u2014 '+mn+'<br>モデルの勝利: '+(bt.mape<bt.naive?'\u2705 ナイーブに勝利':'\u274C ナイーブに敗北')+'</div>';
  }else{
    tc.innerHTML='<div style="font-size:12px"><b>直近'+bt.n+'回のバックテスト結果</b></div>'+
      '<div style="margin-top:8px">'+
      '<div class="entry-row"><span class="entry-label">方向精度</span><span class="entry-val">'+bt.dir.toFixed(0)+'%</span></div>'+
      '<div class="entry-row"><span class="entry-label">モデルMAPE</span><span class="entry-val">'+bt.mape.toFixed(2)+'%</span></div>'+
      '<div class="entry-row"><span class="entry-label">ナイーブMAPE</span><span class="entry-val">'+bt.naive.toFixed(2)+'%</span></div>'+
      '<div class="entry-row"><span class="entry-label">勝敗</span><span class="entry-val">'+(bt.mape<bt.naive?'\u2705 Model WIN':'\u274C Naive WIN')+'</span></div>'+
      '</div>'+
      '<div style="margin-top:12px;font-size:10px;color:var(--dim)">\u203B CoinGecko日足180日データで検証</div>';
  }
}

function setStatus(t){document.getElementById('statusText').textContent=t;}

function startTimer(){
  var sec=120;
  if(refreshTimer)clearInterval(refreshTimer);
  refreshTimer=setInterval(function(){
    sec--;
    document.getElementById('timerText').textContent=sec+'秒後に更新';
    if(sec<=0){sec=120;loadAllData();}
  },1000);
}

// ═══ INIT ═══
buildCoinBar();
loadAllData();
</script>
