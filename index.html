<style>
:root {
  --bg1: #0a0e1a; --bg2: #0a1628; --card: #111a2e; --card2: #162038;
  --border: #1e3050; --text: #e0e8f0; --dim: #7a8a9a;
  --green: #00ffaa; --red: #ff4466; --blue: #3388ff; --yellow: #ffd866;
  --orange: #ff8855; --cyan: #66ffcc;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: linear-gradient(160deg, var(--bg1), var(--bg2));
  color: var(--text); min-height: 100vh;
  background-image: radial-gradient(circle at 1px 1px, #1a2440 1px, transparent 0);
  background-size: 24px 24px;
  -webkit-tap-highlight-color: transparent;
}
.mono { font-family: 'JetBrains Mono', monospace; }
.container { max-width: 480px; margin: 0 auto; padding: 8px; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px;
}
.header h1 { font-size: 16px; font-weight: 700; }
.header h1 span { color: var(--green); }
.badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: #1a3040; color: var(--cyan); border: 1px solid var(--border);
}
.badge.live { color: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 50% { opacity: 0.6; } }

/* Currency toggle */
.curr-toggle {
  display: flex; gap: 2px; background: var(--card); border-radius: 6px;
  padding: 2px; border: 1px solid var(--border);
}
.curr-btn {
  padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer;
  font-size: 12px; font-weight: 600; background: transparent; color: var(--dim);
  font-family: 'Noto Sans JP', sans-serif;
}
.curr-btn.active { background: var(--blue); color: #fff; }

/* Selector */
.selector {
  display: flex; gap: 6px; align-items: center; margin-bottom: 8px;
}
.selector select {
  flex: 1; padding: 8px 10px; background: var(--card); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
}
.refresh-btn {
  padding: 8px 14px; background: var(--card); color: var(--cyan);
  border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
  font-size: 14px; white-space: nowrap;
}
.refresh-btn:active { background: var(--card2); }

/* Status bar */
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--dim); padding: 4px 0; margin-bottom: 8px;
}
.countdown { color: var(--cyan); font-family: 'JetBrains Mono', monospace; }

/* Recommendation panel */
.rec-panel {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px; margin-bottom: 8px;
}
.rec-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.rec-icon { font-size: 32px; }
.rec-action { font-size: 22px; font-weight: 700; }
.rec-stars { font-size: 14px; margin-top: 2px; }
.rec-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px;
}
.rec-cell {
  background: var(--card2); border-radius: 8px; padding: 8px 6px;
  text-align: center;
}
.rec-cell .label { font-size: 10px; color: var(--dim); margin-bottom: 2px; }
.rec-cell .value { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

/* Day1 highlight */
.day1-box {
  background: var(--card2); border: 2px solid var(--blue); border-radius: 10px;
  padding: 10px; margin-bottom: 10px; text-align: center;
}
.day1-box .title { font-size: 11px; color: var(--blue); margin-bottom: 4px; }
.day1-box .pred { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.day1-box .change { font-size: 13px; margin-top: 2px; }

/* Scenario */
.scenario {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
}
.scenario-item {
  background: var(--card2); border-radius: 8px; padding: 8px; text-align: center;
}
.scenario-item .label { font-size: 10px; color: var(--dim); }
.scenario-item .val { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

/* Chart */
.chart-wrap {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 10px; margin-bottom: 8px; position: relative;
}
.chart-wrap canvas { width: 100% !important; height: 220px !important; }

/* Tabs */
.tabs {
  display: flex; gap: 2px; margin-bottom: 8px; background: var(--card);
  border-radius: 8px; padding: 2px; border: 1px solid var(--border);
}
.tab-btn {
  flex: 1; padding: 6px; border: none; border-radius: 6px;
  background: transparent; color: var(--dim); font-size: 11px; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif; font-weight: 500;
}
.tab-btn.active { background: var(--card2); color: var(--text); }

.tab-content { display: none; }
.tab-content.active { display: block; }

.tab-panel {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px; margin-bottom: 8px;
}

/* Gauge */
.gauge-wrap { text-align: center; padding: 10px 0; }
.gauge-svg { width: 180px; height: 110px; }
.gauge-label { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.gauge-sub { font-size: 12px; color: var(--dim); margin-top: 4px; }

/* Model table */
.model-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.model-table th {
  text-align: left; padding: 6px 4px; border-bottom: 1px solid var(--border);
  color: var(--dim); font-weight: 500; font-size: 10px;
}
.model-table td {
  padding: 6px 4px; border-bottom: 1px solid #0d1825;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
}
.model-table tr:nth-child(-n+3) td:first-child { color: var(--green); }
.rank-badge {
  display: inline-block; width: 18px; height: 18px; line-height: 18px;
  text-align: center; border-radius: 50%; font-size: 10px; font-weight: 700;
  margin-right: 4px;
}
.rank-1 { background: #ffd700; color: #000; }
.rank-2 { background: #c0c0c0; color: #000; }
.rank-3 { background: #cd7f32; color: #fff; }

/* Info items */
.info-row {
  display: flex; justify-content: space-between; padding: 6px 0;
  border-bottom: 1px solid #0d1825; font-size: 12px;
}
.info-row .k { color: var(--dim); }

/* Disclaimer */
.disclaimer {
  text-align: center; font-size: 10px; color: #4a5a6a;
  padding: 12px 0; border-top: 1px solid var(--border); margin-top: 8px;
}

/* Loading */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 40px; color: var(--dim);
}
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-top-color: var(--cyan); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none; }

/* Error toast */
.error-toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #2a1020; border: 1px solid var(--red); color: var(--red);
  padding: 8px 16px; border-radius: 8px; font-size: 12px; z-index: 100;
  display: none;
}

<script>
// ============================================================
// Coins config
// ============================================================
const COINS = [
  {id:"bitcoin",sym:"BTC",name:"Bitcoin"},
  {id:"ethereum",sym:"ETH",name:"Ethereum"},
  {id:"ripple",sym:"XRP",name:"XRP"},
  {id:"stellar",sym:"XLM",name:"Stellar"},
  {id:"dogecoin",sym:"DOGE",name:"Dogecoin"},
  {id:"shiba-inu",sym:"SHIB",name:"Shiba Inu"},
  {id:"solana",sym:"SOL",name:"Solana"},
  {id:"cardano",sym:"ADA",name:"Cardano"},
  {id:"avalanche-2",sym:"AVAX",name:"Avalanche"},
  {id:"polkadot",sym:"DOT",name:"Polkadot"},
  {id:"chainlink",sym:"LINK",name:"Chainlink"},
  {id:"tron",sym:"TRX",name:"TRON"},
  {id:"sui",sym:"SUI",name:"Sui"},
];

const BASE_URL = 'https://api.coingecko.com/api/v3';

let currentCoin = COINS[0].id;
let currency = 'jpy';
let jpyRate = 150;
let countdownVal = 120;
let mainChart = null;
let currentData = null;
let fetchInProgress = false;

// ============================================================
// CoinGecko data fetcher (client-side)
// ============================================================
const ohlcvCache = {};
const CACHE_TTL = 120000; // 2 min

async function apiGet(url) {
  const resp = await fetch(url);
  if (resp.status === 429) throw new Error('API rate limit');
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

async function fetchOHLCV(coinId) {
  const now = Date.now();
  if (ohlcvCache[coinId] && now - ohlcvCache[coinId].ts < CACHE_TTL) {
    return ohlcvCache[coinId].data;
  }

  const market = await apiGet(
    `${BASE_URL}/coins/${coinId}/market_chart?vs_currency=usd&days=180`
  );
  if (!market || !market.prices) return null;

  const daily = {};
  for (const [ts, price] of market.prices) {
    const day = new Date(ts).toISOString().slice(0, 10);
    if (!daily[day]) {
      daily[day] = {open: price, high: price, low: price, close: price, volume: 0};
    } else {
      daily[day].close = price;
      daily[day].high = Math.max(daily[day].high, price);
      daily[day].low = Math.min(daily[day].low, price);
    }
  }
  if (market.total_volumes) {
    for (const [ts, vol] of market.total_volumes) {
      const day = new Date(ts).toISOString().slice(0, 10);
      if (daily[day]) daily[day].volume += vol;
    }
  }

  // Overlay OHLC for recent 30 days
  try {
    const ohlc = await apiGet(
      `${BASE_URL}/coins/${coinId}/ohlc?vs_currency=usd&days=30`
    );
    if (ohlc && Array.isArray(ohlc)) {
      const ohlcDaily = {};
      for (const row of ohlc) {
        const [ts, o, h, l, c] = row;
        const day = new Date(ts).toISOString().slice(0, 10);
        if (!ohlcDaily[day]) {
          ohlcDaily[day] = {open: o, high: h, low: l, close: c};
        } else {
          ohlcDaily[day].close = c;
          ohlcDaily[day].high = Math.max(ohlcDaily[day].high, h);
          ohlcDaily[day].low = Math.min(ohlcDaily[day].low, l);
        }
      }
      for (const [day, d] of Object.entries(ohlcDaily)) {
        if (daily[day]) {
          daily[day].open = d.open;
          daily[day].high = d.high;
          daily[day].low = d.low;
          daily[day].close = d.close;
        }
      }
    }
  } catch (e) { /* OHLC overlay optional */ }

  const sortedDays = Object.keys(daily).sort();
  if (!sortedDays.length) return null;

  const data = {
    prices: sortedDays.map(d => daily[d].close),
    volumes: sortedDays.map(d => daily[d].volume),
    highs: sortedDays.map(d => daily[d].high),
    lows: sortedDays.map(d => daily[d].low),
    opens: sortedDays.map(d => daily[d].open),
    dates: sortedDays,
  };

  ohlcvCache[coinId] = {data, ts: now};
  return data;
}

async function fetchJpyRate() {
  try {
    const data = await apiGet(
      `${BASE_URL}/simple/price?ids=usd-coin&vs_currencies=jpy`
    );
    if (data && data['usd-coin']) {
      jpyRate = data['usd-coin'].jpy || 150;
    }
  } catch (e) { /* fallback 150 */ }
}

// ============================================================
// 9-Model Prediction Engine (ported from Python)
// ============================================================
const MONTH_BIAS = {1:-3,2:5,3:-1.3,4:10,5:2,6:3,7:6,8:-1,9:-3,10:15,11:12,12:5};
const MODEL_NAMES = [
  "S/R Level","ATR","EMA Cross","OBV Trend","VWAP Revert",
  "Candlestick","RSI+Vol","Vol Regime","Seasonal"
];

function srLevel(prices, volumes, highs, lows) {
  if (highs.length < 5 || lows.length < 5 || prices.length < 3) return null;
  const recentHigh = Math.max(...highs.slice(-5));
  const recentLow = Math.min(...lows.slice(-5));
  const last = prices[prices.length - 1];
  const range = recentHigh - recentLow;
  if (range <= 0) return null;
  const position = (last - recentLow) / range;
  if (position > 0.8) return last - range * 0.15;
  if (position < 0.2) return last + range * 0.15;
  const trend = (prices[prices.length - 1] - prices[prices.length - 3]) / 3;
  return last + trend;
}

function atrModel(prices, volumes, highs, lows) {
  if (highs.length < 5 || prices.length < 3) return null;
  let atr = 0;
  for (let i = highs.length - 5; i < highs.length; i++) atr += highs[i] - lows[i];
  atr /= 5;
  const trend = prices[prices.length - 1] > prices[prices.length - 3] ? 1 : -1;
  return prices[prices.length - 1] + trend * atr * 0.2;
}

function emaModel(prices) {
  if (prices.length < 5) return null;
  const k = 2 / 6;
  let ema = prices[0];
  for (let i = 1; i < prices.length; i++) ema = prices[i] * k + ema * (1 - k);
  return prices[prices.length - 1] + (ema - prices[prices.length - 1]) * 0.3;
}

function obvModel(prices, volumes) {
  if (prices.length < 8 || !volumes || volumes.length < prices.length) return null;
  let obv = 0;
  const obvArr = [];
  for (let i = 1; i < prices.length; i++) {
    if (prices[i] > prices[i - 1]) obv += volumes[i];
    else if (prices[i] < prices[i - 1]) obv -= volumes[i];
    obvArr.push(obv);
  }
  if (obvArr.length < 5) return null;
  const recent = obvArr.slice(-5);
  const obvUp = recent[recent.length - 1] > recent[0];
  const n = Math.min(4, prices.length - 1);
  let avgChange = 0;
  for (let i = 1; i <= n; i++) avgChange += Math.abs(prices[prices.length - i] - prices[prices.length - i - 1]);
  avgChange /= n;
  return obvUp ? prices[prices.length - 1] + avgChange * 0.3 : prices[prices.length - 1] - avgChange * 0.3;
}

function vwapModel(prices, volumes) {
  if (prices.length < 8 || !volumes || volumes.length < prices.length) return null;
  const window = Math.min(15, prices.length);
  let sumPV = 0, sumV = 0;
  for (let i = 0; i < window; i++) {
    const idx = prices.length - window + i;
    sumPV += prices[idx] * volumes[idx];
    sumV += volumes[idx];
  }
  const vwap = sumV > 0 ? sumPV / sumV : prices[prices.length - 1];
  return prices[prices.length - 1] + (vwap - prices[prices.length - 1]) * 0.2;
}

function candlestickModel(prices, volumes, highs, lows, opens) {
  if (prices.length < 3 || !highs || !lows || !opens) return null;
  if (highs.length < prices.length || lows.length < prices.length || opens.length < prices.length) return null;
  const i = prices.length - 1;
  const body = Math.abs(prices[i] - opens[i]);
  const range = highs[i] - lows[i];
  if (range <= 0) return null;
  const upperWick = highs[i] - Math.max(opens[i], prices[i]);
  const lowerWick = Math.min(opens[i], prices[i]) - lows[i];
  if (lowerWick > body * 2 && upperWick < body * 0.5) return prices[i] + range * 0.25;
  if (upperWick > body * 2 && lowerWick < body * 0.5) return prices[i] - range * 0.25;
  return prices[i];
}

function rsiVolumeModel(prices, volumes) {
  if (prices.length < 15 || !volumes || volumes.length < prices.length) return null;
  let gains = 0, losses = 0;
  for (let j = prices.length - 14; j < prices.length; j++) {
    const change = prices[j] - prices[j - 1];
    const start = Math.max(0, j - 14);
    let avgVol = 0;
    for (let v = start; v < j; v++) avgVol += volumes[v];
    avgVol = avgVol > 0 ? avgVol / 14 : 1;
    const weight = avgVol > 0 ? volumes[j] / avgVol : 1;
    if (change > 0) gains += change * weight;
    else losses -= change * weight;
  }
  const rsi = losses === 0 ? 100 : 100 - 100 / (1 + (gains / 14) / (losses / 14));
  return prices[prices.length - 1] * (1 + (50 - rsi) / 350);
}

function volRegimeModel(prices) {
  if (prices.length < 15) return null;
  const changes = [];
  for (let i = prices.length - 10; i < prices.length; i++) {
    changes.push((prices[i] - prices[i - 1]) / prices[i - 1]);
  }
  let sumSq = 0;
  for (const c of changes) sumSq += c * c;
  const vol = Math.sqrt(sumSq / changes.length);
  const mean = changes.reduce((a, b) => a + b, 0) / changes.length;
  const last = prices[prices.length - 1];
  if (vol > 0.03) {
    const sma5 = prices.slice(-5).reduce((a, b) => a + b, 0) / 5;
    return last + (sma5 - last) * 0.3;
  }
  return last + last * mean;
}

function seasonalModel(prices) {
  const now = new Date();
  const month = now.getMonth() + 1;
  const bias = (MONTH_BIAS[month] || 0) / 100 / 30;
  const halvingDate = new Date(2024, 3, 20);
  const monthsSince = (now - halvingDate) / (30.44 * 24 * 3600 * 1000);
  let halvingBias;
  if (monthsSince >= 0 && monthsSince <= 12) halvingBias = 0.02;
  else if (monthsSince > 12 && monthsSince <= 18) halvingBias = 0.01;
  else halvingBias = -0.01;
  return prices[prices.length - 1] * (1 + bias * 0.3 + halvingBias * 0.3);
}

const ALL_MODELS = [srLevel, atrModel, emaModel, obvModel, vwapModel,
                    candlestickModel, rsiVolumeModel, volRegimeModel, seasonalModel];

function callModel(idx, prices, volumes, highs, lows, opens) {
  const fn = ALL_MODELS[idx];
  if (idx === 0 || idx === 1) return fn(prices, volumes, highs, lows);
  if (idx === 2) return fn(prices);
  if (idx === 3 || idx === 4 || idx === 6) return fn(prices, volumes);
  if (idx === 5) return fn(prices, volumes, highs, lows, opens);
  if (idx === 7 || idx === 8) return fn(prices);
  return null;
}

function ensemblePredict(prices, volumes, highs, lows, opens) {
  const preds = [];
  for (let i = 0; i < ALL_MODELS.length; i++) {
    const p = callModel(i, prices, volumes, highs, lows, opens);
    if (p !== null && p > 0) preds.push(p);
  }
  if (!preds.length) return prices[prices.length - 1];
  return preds.reduce((a, b) => a + b, 0) / preds.length;
}

function runBacktest(prices, volumes, highs, lows, opens) {
  const n = prices.length;
  const testSize = Math.max(5, Math.floor(n * 0.3));
  const start = n - testSize;
  if (start < 10) return {mape: 99, direction: 50, n: 0};

  const errors = [];
  let dirCorrect = 0, total = 0;

  for (let i = start; i < n; i++) {
    const pred = ensemblePredict(
      prices.slice(0, i), volumes.slice(0, i),
      highs.slice(0, i), lows.slice(0, i), opens.slice(0, i)
    );
    const actual = prices[i];
    const prev = prices[i - 1];
    errors.push(Math.abs(pred - actual) / actual * 100);
    if ((pred > prev) === (actual > prev)) dirCorrect++;
    total++;
  }

  return {
    mape: errors.length ? +(errors.reduce((a, b) => a + b, 0) / errors.length).toFixed(2) : 99,
    direction: total > 0 ? +((dirCorrect / total) * 100).toFixed(1) : 50,
    n: total,
  };
}

function backtestIndividual(prices, volumes, highs, lows, opens) {
  const n = prices.length;
  const testSize = Math.max(5, Math.floor(n * 0.3));
  const start = n - testSize;
  if (start < 10) {
    return MODEL_NAMES.map((name, i) => ({name, mape: 99, direction: 50, n: 0}));
  }

  const results = [];
  for (let mi = 0; mi < ALL_MODELS.length; mi++) {
    const errors = [];
    let dirCorrect = 0, total = 0;
    for (let i = start; i < n; i++) {
      const pred = callModel(mi,
        prices.slice(0, i), volumes.slice(0, i),
        highs.slice(0, i), lows.slice(0, i), opens.slice(0, i)
      );
      if (pred === null || pred <= 0) continue;
      const actual = prices[i];
      const prev = prices[i - 1];
      errors.push(Math.abs(pred - actual) / actual * 100);
      if ((pred > prev) === (actual > prev)) dirCorrect++;
      total++;
    }
    results.push({
      name: MODEL_NAMES[mi],
      mape: errors.length ? +(errors.reduce((a, b) => a + b, 0) / errors.length).toFixed(2) : 99,
      direction: total > 0 ? +((dirCorrect / total) * 100).toFixed(1) : 50,
      n: total,
    });
  }
  return results;
}

function forecast7day(prices, volumes, highs, lows, opens, btMape) {
  const last = prices[prices.length - 1];
  const changes = [];
  const start = Math.max(1, prices.length - 20);
  for (let i = start; i < prices.length; i++) {
    changes.push((prices[i] - prices[i - 1]) / prices[i - 1]);
  }
  const vol = changes.length
    ? Math.sqrt(changes.reduce((s, c) => s + c * c, 0) / changes.length)
    : 0.025;

  const forecasts = [{day: 0, price: +last.toFixed(6), upper: +last.toFixed(6), lower: +last.toFixed(6)}];
  const simP = [...prices];
  const simV = volumes ? [...volumes] : null;
  const simH = highs ? [...highs] : null;
  const simL = lows ? [...lows] : null;
  const simO = opens ? [...opens] : null;

  for (let d = 1; d <= 7; d++) {
    const pred = ensemblePredict(simP, simV, simH, simL, simO);
    const damp = 1 / (1 + d * 0.08);
    const damped = last + (pred - last) * damp;

    const marketUnc = last * vol * Math.sqrt(d) * 1.96;
    const modelUnc = last * (btMape / 100) * d * 1.5;
    const totalUnc = marketUnc + modelUnc;

    forecasts.push({
      day: d,
      price: +damped.toFixed(6),
      upper: +(damped + totalUnc).toFixed(6),
      lower: +Math.max(damped - totalUnc, damped * 0.3).toFixed(6),
    });

    simP.push(pred);
    if (simV) simV.push(simV[simV.length - 1]);
    if (simH) simH.push(Math.max(pred, damped) * 1.01);
    if (simL) simL.push(Math.min(pred, damped) * 0.99);
    if (simO) simO.push(simP[simP.length - 2]);
  }
  return forecasts;
}

function getReliability(mape, dirAcc) {
  if (dirAcc <= 35 || mape > 12) return {label:"\u4F4E",stars:"\u2605\u2606\u2606\u2606\u2606",color:"#ff4466"};
  if (dirAcc <= 45 || mape > 8) return {label:"\u4E2D\u4F4E",stars:"\u2605\u2605\u2606\u2606\u2606",color:"#ff8855"};
  if (dirAcc <= 55 || mape > 5) return {label:"\u4E2D",stars:"\u2605\u2605\u2605\u2606\u2606",color:"#ffd866"};
  if (dirAcc <= 65 || mape > 3) return {label:"\u4E2D\u9AD8",stars:"\u2605\u2605\u2605\u2605\u2606",color:"#66ffcc"};
  return {label:"\u9AD8",stars:"\u2605\u2605\u2605\u2605\u2605",color:"#00ffaa"};
}

function getRecommendation(score, fcChange) {
  if (score >= 65 && fcChange > 0.5) return {action:"\u8CB7\u3044\u6642",color:"#00ffaa",icon:"\uD83D\uDFE2"};
  if (score >= 55 && fcChange > 0) return {action:"\u3084\u3084\u8CB7\u3044",color:"#66ffcc",icon:"\uD83D\uDD35"};
  if (score <= 35 && fcChange < -0.5) return {action:"\u3084\u3084\u58F2\u308A",color:"#ff8855",icon:"\uD83D\uDFE0"};
  if (score <= 45 && fcChange < 0) return {action:"\u3084\u3084\u58F2\u308A",color:"#ff8855",icon:"\uD83D\uDFE0"};
  return {action:"\u69D8\u5B50\u898B",color:"#ffd866",icon:"\uD83D\uDFE1"};
}

// ============================================================
// Main data pipeline
// ============================================================
async function processData(coinId) {
  const ohlcv = await fetchOHLCV(coinId);
  if (!ohlcv) throw new Error('\u30C7\u30FC\u30BF\u53D6\u5F97\u5931\u6557');

  const {prices, volumes, highs, lows, opens, dates} = ohlcv;
  const bt = runBacktest(prices, volumes, highs, lows, opens);
  const fc = forecast7day(prices, volumes, highs, lows, opens, bt.mape);
  const rel = getReliability(bt.mape, bt.direction);

  const last = prices[prices.length - 1];
  const fcChange = +((fc[7].price - last) / last * 100).toFixed(2);
  const day1Change = +((fc[1].price - last) / last * 100).toFixed(2);
  const confidence = Math.max(0, Math.min(100, 100 - bt.mape * 10));
  const score = +(confidence * 0.4 + bt.direction * 0.4 + (fcChange > 0 ? 60 : 40) * 0.2).toFixed(1);
  const rec = getRecommendation(score, fcChange);
  const individual = backtestIndividual(prices, volumes, highs, lows, opens);

  return {prices, volumes, highs, lows, opens, dates, backtest: bt,
          forecast: fc, reliability: rel, recommendation: rec,
          score, fc_change: fcChange, day1_change: day1Change, individual};
}

// UI Logic

document.addEventListener('DOMContentLoaded', () => {
  initCoinSelect();
  initTabs();
  initCurrToggle();
  fetchJpyRate();
  loadData(currentCoin);
  setInterval(tick, 1000);
});

function initCoinSelect() {
  const sel = document.getElementById('coinSelect');
  COINS.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = `${c.sym} \u2014 ${c.name}`;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', e => { currentCoin = e.target.value; loadData(currentCoin); });
}

function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });
}

function initCurrToggle() {
  document.querySelectorAll('.curr-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.curr-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currency = btn.dataset.curr;
      if (currentData) render(currentData);
    });
  });
}

function tick() {
  countdownVal--;
  if (countdownVal <= 0) { countdownVal = 120; loadData(currentCoin); }
  document.getElementById('countdown').textContent = countdownVal + 's';
}

function refresh() { countdownVal = 120; loadData(currentCoin); }

function showError(msg) {
  const el = document.getElementById('errorToast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// --- Format ---
function fmtPrice(usd) {
  if (currency === 'jpy') {
    const jpy = usd * jpyRate;
    if (jpy >= 1000000) return '\u00A5' + (jpy/1000000).toFixed(2) + 'M';
    if (jpy >= 1000) return '\u00A5' + jpy.toLocaleString('ja-JP', {maximumFractionDigits: 0});
    if (jpy >= 1) return '\u00A5' + jpy.toFixed(2);
    return '\u00A5' + jpy.toFixed(4);
  }
  if (usd >= 1000) return '$' + usd.toLocaleString('en-US', {maximumFractionDigits: 0});
  if (usd >= 1) return '$' + usd.toFixed(2);
  if (usd >= 0.01) return '$' + usd.toFixed(4);
  return '$' + usd.toFixed(6);
}

function fmtPct(v) { return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }

// --- Load Data ---
async function loadData(coinId) {
  if (fetchInProgress) return;
  fetchInProgress = true;
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('mainContent').classList.add('hidden');
  document.getElementById('statusText').textContent = `${coinId} \u30C7\u30FC\u30BF\u53D6\u5F97\u4E2D...`;

  try {
    const data = await processData(coinId);
    currentData = data;
    render(data);
    document.getElementById('statusText').textContent =
      `${COINS.find(c => c.id === coinId)?.sym || coinId} \u2014 ${new Date().toLocaleTimeString('ja-JP')} \u66F4\u65B0`;
    document.getElementById('liveBadge').textContent = '\uD83D\uDCE1 LIVE';
    document.getElementById('liveBadge').classList.add('live');
  } catch (e) {
    document.getElementById('statusText').textContent = '\u26A0\uFE0F \u53D6\u5F97\u5931\u6557: ' + e.message;
    document.getElementById('liveBadge').textContent = '\uD83D\uDCC5 \u56FA\u5B9A';
    document.getElementById('liveBadge').classList.remove('live');
    showError(e.message);
  } finally {
    fetchInProgress = false;
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
  }
}

// --- Render ---
function render(data) {
  const last = data.prices[data.prices.length - 1];
  const rec = data.recommendation;
  const rel = data.reliability;
  const bt = data.backtest;
  const fc = data.forecast;

  document.getElementById('recIcon').textContent = rec.icon;
  document.getElementById('recAction').textContent = rec.action;
  document.getElementById('recAction').style.color = rec.color;
  document.getElementById('recStars').innerHTML =
    `<span style="color:${rel.color}">${rel.stars}</span> \u4FE1\u983C\u5EA6: ${rel.label}`;
  document.getElementById('curPrice').textContent = fmtPrice(last);
  document.getElementById('mapeVal').textContent = bt.mape + '%';
  document.getElementById('dirVal').textContent = bt.direction + '%';
  document.getElementById('relVal').textContent = rel.label;
  document.getElementById('relVal').style.color = rel.color;

  const d1 = fc[1];
  document.getElementById('day1Price').textContent = fmtPrice(d1.price);
  const d1c = data.day1_change;
  const d1el = document.getElementById('day1Change');
  d1el.textContent = fmtPct(d1c);
  d1el.style.color = d1c >= 0 ? 'var(--green)' : 'var(--red)';

  const d7 = fc[7];
  document.getElementById('scUp').textContent = fmtPrice(d7.upper);
  document.getElementById('scBase').textContent = fmtPrice(d7.price);
  document.getElementById('scDown').textContent = fmtPrice(d7.lower);

  renderChart(data);
  renderJudge(data);
  renderModels(data);
  renderOptimize(data);
  renderVerify(data);
}

function renderChart(data) {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChart) mainChart.destroy();

  const prices = data.prices;
  const dates = data.dates || prices.map((_, i) => i);
  const fc = data.forecast;

  const labels = [...dates];
  for (let d = 1; d <= 7; d++) {
    const dt = new Date();
    dt.setDate(dt.getDate() + d);
    labels.push(dt.toISOString().slice(5, 10));
  }

  const mult = currency === 'jpy' ? jpyRate : 1;
  const actualData = prices.map(p => p * mult);
  const fcData = new Array(prices.length - 1).fill(null);
  fcData.push(prices[prices.length - 1] * mult);
  for (let d = 1; d <= 7; d++) fcData.push(fc[d].price * mult);

  const upperData = new Array(prices.length - 1).fill(null);
  upperData.push(prices[prices.length - 1] * mult);
  for (let d = 1; d <= 7; d++) upperData.push(fc[d].upper * mult);

  const lowerData = new Array(prices.length - 1).fill(null);
  lowerData.push(prices[prices.length - 1] * mult);
  for (let d = 1; d <= 7; d++) lowerData.push(fc[d].lower * mult);

  const trendUp = prices[prices.length - 1] >= prices[Math.max(0, prices.length - 8)];

  mainChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '\u5B9F\u7E3E', data: actualData.concat(new Array(7).fill(null)),
          borderColor: trendUp ? '#00ffaa' : '#ff4466',
          backgroundColor: trendUp ? 'rgba(0,255,170,0.05)' : 'rgba(255,68,102,0.05)',
          borderWidth: 2, pointRadius: 0, fill: true, tension: 0.3,
        },
        {
          label: '\u4E88\u6E2C', data: fcData,
          borderColor: '#3388ff', borderWidth: 2, borderDash: [6, 3],
          pointRadius: 0, fill: false, tension: 0.3,
        },
        {
          label: '95%CI\u4E0A\u9650', data: upperData,
          borderColor: 'rgba(51,136,255,0.2)', borderWidth: 1,
          pointRadius: 0, fill: false,
        },
        {
          label: '95%CI\u4E0B\u9650', data: lowerData,
          borderColor: 'rgba(51,136,255,0.2)', borderWidth: 1,
          pointRadius: 0, fill: '-1', backgroundColor: 'rgba(51,136,255,0.08)',
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {display: false},
        tooltip: {
          backgroundColor: '#111a2e', titleColor: '#e0e8f0', bodyColor: '#e0e8f0',
          borderColor: '#1e3050', borderWidth: 1,
          callbacks: {
            label: (ctx) => {
              if (ctx.raw === null) return '';
              const sym = currency === 'jpy' ? '\u00A5' : '$';
              return ctx.dataset.label + ': ' + sym + ctx.raw.toLocaleString(undefined, {maximumFractionDigits: 2});
            }
          }
        }
      },
      scales: {
        x: {
          display: true, grid: {color: 'rgba(30,48,80,0.3)'},
          ticks: {color: '#4a5a6a', font: {size: 9}, maxTicksLimit: 8, maxRotation: 0},
        },
        y: {
          display: true, grid: {color: 'rgba(30,48,80,0.3)'},
          ticks: {
            color: '#4a5a6a', font: {size: 9, family: 'JetBrains Mono'},
            callback: v => {
              const sym = currency === 'jpy' ? '\u00A5' : '$';
              if (v >= 1000000) return sym + (v / 1000000).toFixed(1) + 'M';
              if (v >= 1000) return sym + (v / 1000).toFixed(0) + 'K';
              return sym + v.toFixed(2);
            }
          }
        }
      },
      interaction: {intersect: false, mode: 'index'},
    }
  });
}

function renderJudge(data) {
  const score = data.score;
  const arcLen = 251.3;
  const pct = Math.min(score, 100) / 100;
  document.getElementById('gaugeArc').setAttribute('stroke-dasharray', `${arcLen * pct} ${arcLen}`);

  let color = 'var(--yellow)';
  if (score >= 65) color = 'var(--green)';
  else if (score >= 55) color = 'var(--cyan)';
  else if (score <= 35) color = 'var(--red)';
  else if (score <= 45) color = 'var(--orange)';
  document.getElementById('gaugeArc').setAttribute('stroke', color);
  document.getElementById('gaugeText').textContent = score.toFixed(1);

  const bt = data.backtest;
  const confidence = Math.max(0, Math.min(100, 100 - bt.mape * 10));
  document.getElementById('judgeDetails').innerHTML = `
    <div class="info-row"><span class="k">\u30E2\u30C7\u30EB\u4FE1\u983C\u5EA6</span><span class="v">${confidence.toFixed(1)}%</span></div>
    <div class="info-row"><span class="k">\u65B9\u5411\u7CBE\u5EA6</span><span class="v">${bt.direction}%</span></div>
    <div class="info-row"><span class="k">7\u65E5\u5909\u52D5\u4E88\u6E2C</span><span class="v" style="color:${data.fc_change >= 0 ? 'var(--green)' : 'var(--red)'}">${fmtPct(data.fc_change)}</span></div>
    <div class="info-row"><span class="k">\u30D0\u30C3\u30AF\u30C6\u30B9\u30C8N</span><span class="v">${bt.n}</span></div>
    <div class="info-row"><span class="k">\u5224\u5B9A</span><span class="v" style="color:${data.recommendation.color}">${data.recommendation.icon} ${data.recommendation.action}</span></div>
  `;
}

function renderModels(data) {
  const body = document.getElementById('modelBody');
  if (!data.individual) { body.innerHTML = '<tr><td colspan="5">\u30C7\u30FC\u30BF\u306A\u3057</td></tr>'; return; }
  const sorted = data.individual.map((m, i) => ({...m, idx: i})).sort((a, b) => a.mape - b.mape);
  body.innerHTML = sorted.map((m, rank) => {
    let badge;
    if (rank === 0) badge = '<span class="rank-badge rank-1">1</span>';
    else if (rank === 1) badge = '<span class="rank-badge rank-2">2</span>';
    else if (rank === 2) badge = '<span class="rank-badge rank-3">3</span>';
    else badge = `<span style="margin-right:4px;color:var(--dim)">${rank + 1}</span>`;
    const dirColor = m.direction >= 60 ? 'var(--green)' : m.direction >= 50 ? 'var(--yellow)' : 'var(--red)';
    return `<tr><td>${badge}</td><td>${m.name}</td><td>${m.mape}%</td><td style="color:${dirColor}">${m.direction}%</td><td style="color:var(--dim)">${m.n}</td></tr>`;
  }).join('');
}

function renderOptimize(data) {
  const bt = data.backtest;
  document.getElementById('optimizeInfo').innerHTML = `
    <div class="info-row"><span class="k">\u30A2\u30F3\u30B5\u30F3\u30D6\u30EB\u65B9\u5F0F</span><span class="v">\u5747\u7B49\u91CD\u307F\u5E73\u5747</span></div>
    <div class="info-row"><span class="k">\u30E2\u30C7\u30EB\u6570</span><span class="v">9</span></div>
    <div class="info-row"><span class="k">\u4E88\u6E2C\u30DB\u30E9\u30A4\u30BA\u30F3</span><span class="v">1-7\u65E5</span></div>
    <div class="info-row"><span class="k">\u30C0\u30F3\u30D4\u30F3\u30B0\u4FC2\u6570</span><span class="v">1/(1+d*0.08)</span></div>

    <div class="info-row"><span class="k">\u30CA\u30A4\u30FC\u30D6\u8D85\u3048</span><span class="v">${bt.mape < 3 ? 'Yes' : 'No'}</span></div>
  `;
}

    <div class="info-row"><span class="k">\u65B9\u5411\u7CBE\u5EA6</span><span class="v">${bt.direction}%</span></div>
